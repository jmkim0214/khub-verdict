const OY='https://www.oliveyoung.co.kr/store/goods/getGoodsDetail.do?goodsNo=';
let filter='all';
const list=document.getElementById('list'),cnt=document.getElementById('cnt'),q=document.getElementById('q');
function esc(s){return (s||'').replace(/</g,'&lt;')}
function render(items){
 cnt.textContent=items.length+'개 성분';
 if(!items.length){list.innerHTML='<div class=empty>결과가 없어요</div>';return;}
 list.innerHTML=items.slice(0,300).map(x=>{
  const c=TC[x.t]||'#ced4da';
  const cau=(x.c||[]).map(k=>`<div class=cauw><span class=caut>${k.icon} ${k.type}</span>${k.text}</div>`).join('');
  const gl=IP[x.n]||[];
  const fq=x.f>0
    ? (gl.length?`<button class=fq data-n="${esc(x.n)}">${x.f}개 제품 ▾</button>`:`<span class="fq plain">${x.f}개 제품</span>`)
    : '';
  return `<div class=item data-name="${esc(x.n)}"><div class=nm>${x.n}<span class=tag style="background:${c}">${x.t}</span>${fq}</div>
   <div class=ds>${x.d}</div>${cau?`<div class=cau>${cau}</div>`:''}<div class=prods></div></div>`;
 }).join('');
}
function toggleProds(btn){
 const item=btn.closest('.item'); const box=item.querySelector('.prods');
 if(box.classList.contains('on')){box.classList.remove('on'); btn.innerHTML=btn.innerHTML.replace('▴','▾'); return;}
 const gl=IP[btn.dataset.n]||[];
 box.innerHTML=gl.map(g=>`<a href="${OY}${g}" target="_blank" rel="noopener">${esc(PROD[g]||g)}</a>`).join('')
   + (gl.length>=40?`<div class=more>※ 최대 40개까지 표시</div>`:'');
 box.classList.add('on'); btn.innerHTML=btn.innerHTML.replace('▾','▴');
}
function apply(){
 const s=q.value.trim().toLowerCase();
 let items=DATA;
 if(filter!=='all') items=items.filter(x=>(x.c||[]).some(k=>k.icon===filter));
 if(s) items=items.filter(x=>x.n.toLowerCase().includes(s)||x.d.includes(s)||x.t.includes(s));
 else if(filter==='all') items=items.slice(0,60);
 render(items);
}
q.addEventListener('input',apply);
list.addEventListener('click',e=>{ const b=e.target.closest('.fq[data-n]'); if(b) toggleProds(b); });
document.getElementById('chips').addEventListener('click',e=>{
 if(!e.target.dataset.f)return;
 filter=e.target.dataset.f;
 [...document.querySelectorAll('.fchip')].forEach(b=>b.classList.toggle('on',b===e.target));
 apply();
});
// ?q= 딥링크: 판정서 성분에서 넘어오면 그 성분을 바로 검색
const qp=new URLSearchParams(location.search).get('q');
if(qp){ q.value=qp; }
apply();
